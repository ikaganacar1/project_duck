<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Duck Hunt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; touch-action: none; }
    canvas { display: block; }
    #rotate-message {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: #f0c020; z-index: 9999;
      justify-content: center; align-items: center;
      flex-direction: column; font-family: sans-serif; font-size: 24px;
    }
    #rotate-message span { font-size: 60px; }
    @media (orientation: portrait) {
      #rotate-message { display: flex; }
      #game-container { display: none; }
    }
  </style>
</head>
<body>
  <div id="rotate-message">
    <span>&#x1F4F1;</span>
    <p>Cihazini yatay cevir</p>
  </div>
  <div id="game-container"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/constants.js?v=28"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="network/socket.js?v=28"></script>
  <script src="input/joystick.js?v=28"></script>
  <script src="scenes/BootScene.js?v=28"></script>
  <script src="scenes/LobbyScene.js?v=28"></script>
  <script src="scenes/CountdownScene.js?v=28"></script>
  <script src="scenes/GameScene.js?v=28"></script>
  <script src="scenes/ResultScene.js?v=28"></script>
  <script src="scenes/SpectatorScene.js?v=28"></script>
  <script src="main.js?v=28"></script>
</body>
</html>
